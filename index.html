<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>حار بارد 🔥🧊</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --hot: #ff3b1e;
            --cold: #2dd4ff;
            --gold: #fbbf24;
            --bg: #080c14;
            --surface: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* ===== خلفية حية ===== */
        .bg-canvas {
            position: fixed; inset: 0; z-index: 0; overflow: hidden;
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.25;
            animation: orbFloat 8s ease-in-out infinite;
        }
        .orb-1 { width: 500px; height: 500px; background: var(--hot); top: -150px; right: -100px; animation-delay: 0s; }
        .orb-2 { width: 400px; height: 400px; background: var(--cold); bottom: -100px; left: -80px; animation-delay: -3s; }
        .orb-3 { width: 300px; height: 300px; background: #7c3aed; top: 40%; left: 40%; animation-delay: -5s; }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -40px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }

        /* شبكة نقطية */
        .bg-grid {
            position: fixed; inset: 0; z-index: 0;
            background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
            background-size: 32px 32px;
        }

        /* ===== البطاقة الرئيسية ===== */
        .card {
            position: relative; z-index: 10;
            background: rgba(10, 15, 28, 0.85);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 48px 40px 40px;
            width: 92%;
            max-width: 420px;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 40px 80px rgba(0,0,0,0.7);
            animation: cardEntrance 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(30px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ===== الشعار ===== */
        .logo {
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 6px;
        }
        .logo-hot {
            font-size: 3.2rem;
            font-weight: 900;
            color: var(--hot);
            letter-spacing: -1px;
            text-shadow: 0 0 30px rgba(255,59,30,0.6), 0 0 60px rgba(255,59,30,0.3);
            animation: hotPulse 2s ease-in-out infinite;
        }
        .logo-cold {
            font-size: 3.2rem;
            font-weight: 900;
            color: var(--cold);
            letter-spacing: -1px;
            text-shadow: 0 0 30px rgba(45,212,255,0.6), 0 0 60px rgba(45,212,255,0.3);
            animation: coldPulse 2s ease-in-out infinite;
        }
        @keyframes hotPulse {
            0%,100% { text-shadow: 0 0 30px rgba(255,59,30,0.6); }
            50% { text-shadow: 0 0 50px rgba(255,59,30,0.9), 0 0 80px rgba(255,59,30,0.4); }
        }
        @keyframes coldPulse {
            0%,100% { text-shadow: 0 0 30px rgba(45,212,255,0.6); }
            50% { text-shadow: 0 0 50px rgba(45,212,255,0.9), 0 0 80px rgba(45,212,255,0.4); }
        }

        .tagline {
            text-align: center;
            color: rgba(255,255,255,0.4);
            font-size: 0.95rem;
            margin-bottom: 36px;
            letter-spacing: 0.5px;
        }

        /* ===== الفاصل ===== */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 28px 0;
        }
        .divider-line { flex: 1; height: 1px; background: var(--border); }
        .divider-text { color: rgba(255,255,255,0.25); font-size: 0.8rem; white-space: nowrap; }

        /* ===== الإدخالات ===== */
        .input-group {
            position: relative;
            margin-bottom: 14px;
        }
        .input-label {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.35);
            margin-bottom: 6px;
            display: block;
            padding-right: 4px;
        }
        .input-field {
            width: 100%;
            padding: 14px 18px;
            font-size: 1.05rem;
            font-family: 'Cairo', sans-serif;
            text-align: right;
            border-radius: 14px;
            border: 1.5px solid var(--border);
            background: rgba(255,255,255,0.05);
            color: white;
            outline: none;
            transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
        }
        .input-field::placeholder { color: rgba(255,255,255,0.2); }
        .input-field:focus {
            border-color: var(--gold);
            background: rgba(251,191,36,0.06);
            box-shadow: 0 0 0 3px rgba(251,191,36,0.12);
        }
        .input-field[type="number"]:focus {
            border-color: var(--cold);
            background: rgba(45,212,255,0.06);
            box-shadow: 0 0 0 3px rgba(45,212,255,0.12);
        }

        /* ===== الأزرار ===== */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 15px 20px;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            color: white;
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }
        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0);
            transition: background 0.15s;
        }
        .btn:hover::after { background: rgba(255,255,255,0.06); }
        .btn:active { transform: scale(0.96); }

        .btn-join {
            background: linear-gradient(135deg, #1a4fd6 0%, #1e3a8a 100%);
            box-shadow: 0 4px 20px rgba(29,78,216,0.35), inset 0 1px 0 rgba(255,255,255,0.1);
            border: 1px solid rgba(59,130,246,0.3);
            margin-bottom: 10px;
        }
        .btn-host {
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            box-shadow: 0 4px 20px rgba(220,38,38,0.35), inset 0 1px 0 rgba(255,255,255,0.1);
            border: 1px solid rgba(239,68,68,0.3);
        }

        .btn-icon {
            font-size: 1.3rem;
            animation: iconBounce 2.5s ease-in-out infinite;
        }
        @keyframes iconBounce {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        /* ===== جزء الانضمام ===== */
        .join-section {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 20px;
        }

        /* ===== تأثير الموجة عند النقر ===== */
        .ripple-effect {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transform: scale(0);
            animation: ripple 0.6s linear;
            pointer-events: none;
        }
        @keyframes ripple {
            to { transform: scale(4); opacity: 0; }
        }

    </style>
</head>
<body>

    <div class="bg-canvas">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    <div class="bg-grid"></div>

    <div class="card">

        <div class="logo">
            <span class="logo-hot">حار</span>
            <span style="color:rgba(255,255,255,0.15); font-size:2rem;">|</span>
            <span class="logo-cold">بارد</span>
        </div>
        <p class="tagline">🧠 تحدي التخمين وقراءة الأفكار</p>

        <div class="input-group">
            <label class="input-label">اسمك في اللعبة</label>
            <input class="input-field" type="text" id="nameInput" placeholder="اكتب اسمك..." maxlength="12" autocomplete="off">
        </div>

        <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-text">انضم أو ابدأ</div>
            <div class="divider-line"></div>
        </div>

        <div class="join-section">
            <div class="input-group" style="margin-bottom:14px;">
                <label class="input-label">كود الغرفة (4 أرقام)</label>
                <input class="input-field" type="number" id="pinInput" placeholder="مثال: 4829" inputmode="numeric" pattern="[0-9]*" maxlength="4">
            </div>
            <button class="btn btn-join" onclick="joinRoom(this)">
                <span class="btn-icon">❄️</span>
                دخول تحدي قائم
            </button>
        </div>

        <div style="margin-top: 12px;">
            <button class="btn btn-host" onclick="createRoom(this)">
                <span class="btn-icon" style="animation-delay:-1.2s;">🔥</span>
                إنشاء تحدي جديد
            </button>
        </div>

    </div>

    <script>
        // تأثير موجة عند النقر
        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                const ripple = document.createElement('span');
                ripple.classList.add('ripple-effect');
                const rect = this.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                ripple.style.cssText = `width:${size}px;height:${size}px;top:${e.clientY-rect.top-size/2}px;left:${e.clientX-rect.left-size/2}px`;
                this.appendChild(ripple);
                setTimeout(() => ripple.remove(), 700);
            });
        });

        function getName() {
            const name = document.getElementById('nameInput').value.trim();
            if (!name) {
                document.getElementById('nameInput').focus();
                document.getElementById('nameInput').style.borderColor = 'var(--hot)';
                setTimeout(() => document.getElementById('nameInput').style.borderColor = '', 1500);
                return null;
            }
            return name;
        }

        function createRoom() {
            const name = getName();
            if (!name) return;
            const pin = Math.floor(1000 + Math.random() * 9000);
            window.location.href = `game.html?pin=${pin}&name=${encodeURIComponent(name)}&role=host`;
        }

        function joinRoom() {
            const name = getName();
            if (!name) return;
            const pin = document.getElementById('pinInput').value;
            if (pin.length === 4) {
                window.location.href = `game.html?pin=${pin}&name=${encodeURIComponent(name)}`;
            } else {
                document.getElementById('pinInput').focus();
                document.getElementById('pinInput').style.borderColor = 'var(--hot)';
                setTimeout(() => document.getElementById('pinInput').style.borderColor = '', 1500);
            }
        }
    </script>
</body>
</html>
