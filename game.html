<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>حار بارد - الطاولة الجماعية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --hot: #ff3b1e;
            --cold: #2dd4ff;
            --warm: #fbbf24;
            --green: #10b981;
            --bg: #060b12;
            --surface: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.08);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: white;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* ====== خلفية حية ====== */
        .ambient-bg {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            transition: all 1s ease;
        }
        .ambient-bg.state-cold { background: radial-gradient(ellipse at 50% 50%, rgba(45,212,255,0.08) 0%, transparent 70%); }
        .ambient-bg.state-hot { background: radial-gradient(ellipse at 50% 50%, rgba(255,59,30,0.12) 0%, transparent 70%); }
        .ambient-bg.state-warm { background: radial-gradient(ellipse at 50% 50%, rgba(251,191,36,0.1) 0%, transparent 70%); }
        .ambient-bg.state-neutral { background: radial-gradient(ellipse at 50% 50%, rgba(100,116,139,0.06) 0%, transparent 70%); }

        /* ====== الأوفرلاي (اللوبي والنهاية) ====== */
        .overlay {
            position: fixed; inset: 0; z-index: 200;
            display: none; flex-direction: column;
            justify-content: center; align-items: center;
            background: rgba(6,11,18,0.92);
            backdrop-filter: blur(20px);
        }
        .overlay-card {
            background: rgba(15,23,42,0.95);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 44px 36px;
            width: 90%; max-width: 450px;
            text-align: center;
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
            animation: cardPop 0.5s cubic-bezier(0.22,1,0.36,1) both;
        }
        @keyframes cardPop {
            from { opacity:0; transform: scale(0.88) translateY(20px); }
            to { opacity:1; transform: scale(1) translateY(0); }
        }

        .pin-display {
            font-size: 4rem; font-weight: 900;
            font-family: monospace; color: var(--warm);
            letter-spacing: 10px; margin: 12px 0;
            text-shadow: 0 0 30px rgba(251,191,36,0.5);
            animation: pinGlow 2s ease-in-out infinite;
        }
        @keyframes pinGlow {
            0%,100% { text-shadow: 0 0 20px rgba(251,191,36,0.4); }
            50% { text-shadow: 0 0 40px rgba(251,191,36,0.8), 0 0 60px rgba(251,191,36,0.3); }
        }

        .players-list {
            display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 16px 0;
        }
        .player-badge {
            background: var(--surface); border: 1px solid var(--border);
            padding: 5px 15px; border-radius: 20px; font-weight: bold;
        }

        .btn-start {
            width: 100%; padding: 16px; margin-top: 20px;
            font-size: 1.2rem; font-weight: 700; font-family: 'Cairo', sans-serif;
            border: none; border-radius: 16px;
            background: linear-gradient(135deg, #10b981, #047857);
            color: white; cursor: pointer;
            box-shadow: 0 6px 24px rgba(16,185,129,0.4);
            transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
        }
        .btn-start:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(16,185,129,0.5); }
        .btn-start:active { transform: scale(0.96); }
        .btn-start:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

        /* ====== ساحة اللعب ====== */
        .game-arena {
            flex: 1; display: flex; flex-direction: column;
            position: relative; z-index: 10; overflow: hidden;
        }

        /* منطقة الخصوم */
        .opponents-container {
            flex: 1; display: flex; flex-wrap: wrap; justify-content: center; align-content: flex-end;
            gap: 15px; padding: 20px; overflow-y: auto;
        }

        .player-zone {
            display: flex; flex-direction: column; align-items: center;
            padding: 15px; border-radius: 20px; position: relative;
            transition: background 0.5s; flex: 1 1 40%; max-width: 250px;
        }
        .player-zone.is-active-turn {
            background: radial-gradient(circle at 50% 50%, rgba(251,191,36,0.1) 0%, transparent 80%);
            border: 1px solid rgba(251,191,36,0.2);
        }

        .turn-badge {
            position: absolute; top: -10px; right: -10px; display: none;
            background: var(--warm); color: #000; padding: 4px 12px;
            border-radius: 20px; font-size: 0.8rem; font-weight: 900;
            box-shadow: 0 4px 16px rgba(251,191,36,0.4);
            animation: badgePop 0.3s both; z-index: 5;
        }
        .is-active-turn .turn-badge { display: block; }
        @keyframes badgePop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .player-info {
            display: flex; align-items: center; gap: 8px; margin-bottom: 10px; width: 100%; justify-content: center;
        }
        .avatar {
            width: 35px; height: 35px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; border: 2px solid var(--border); background: rgba(255,255,255,0.06);
        }
        .is-active-turn .avatar { border-color: var(--warm); box-shadow: 0 0 10px rgba(251,191,36,0.4); }
        .p-name { font-size: 1rem; font-weight: 700; color: rgba(255,255,255,0.7); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 90px;}
        .is-active-turn .p-name { color: var(--warm); }
        .score-tag { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 10px; padding: 2px 8px; font-size: 0.75rem; color: rgba(255,255,255,0.4); }

        .word-card {
            width: 100%; border-radius: 15px; display: flex; align-items: center; justify-content: center;
            text-align: center; padding: 15px 10px; position: relative; min-height: 80px;
        }
        .word-card-opp {
            background: linear-gradient(145deg, #f8fafc, #e2e8f0); color: #0f172a;
            border: 3px solid #cbd5e1; box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            font-size: 1.3rem; font-weight: 900; transform: perspective(600px) rotateX(-5deg);
        }

        /* --- أيقونة تصويت اللاعب الفردي (الجديدة) --- */
        .vote-badge {
            position: absolute; top: -15px; left: -10px;
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; border: 3px solid #fdfbf7;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6); z-index: 20;
            animation: popVote 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
        }
        @keyframes popVote {
            from { transform: scale(0) rotate(-45deg); opacity: 0; }
            to { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        /* منطقتي أنا */
        .my-zone {
            flex-shrink: 0; display: flex; flex-direction: column; align-items: center;
            padding: 20px; background: rgba(0,0,0,0.3); border-top: 1px solid var(--border);
            position: relative;
        }
        .my-zone.is-active-turn { background: radial-gradient(circle at 50% 100%, rgba(251,191,36,0.15) 0%, transparent 80%); }
        .word-card-mine {
            width: 90%; max-width: 350px; min-height: 100px;
            background: repeating-linear-gradient(-45deg, rgba(30,41,59,0.8), rgba(30,41,59,0.8) 12px, rgba(15,23,42,0.8) 12px, rgba(15,23,42,0.8) 24px);
            border: 3px solid rgba(255,255,255,0.1); box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            font-size: 2.5rem; color: var(--warm); letter-spacing: 8px;
            transform: perspective(600px) rotateX(5deg);
        }

        /* ====== الفاصل والترمومتر ====== */
        .center-divider { position: relative; height: 50px; flex-shrink: 0; z-index: 20; display: flex; align-items: center; }
        .divider-line { position: absolute; top: 50%; left: 0; right: 0; height: 2px; background: linear-gradient(to right, transparent, var(--border) 20%, var(--border) 80%, transparent); }
        .thermometer-hub {
            position: absolute; left: 50%; transform: translateX(-50%); background: rgba(6,11,18,0.95);
            backdrop-filter: blur(12px); border: 2px solid var(--border); border-radius: 50px;
            padding: 5px 20px; display: flex; align-items: center; gap: 10px; min-width: 140px; justify-content: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.8); transition: all 0.5s;
        }
        .thermo-emoji { font-size: 1.5rem; transition: all 0.4s; }
        .thermo-label { font-size: 1rem; font-weight: 900; transition: all 0.4s; text-align: center; }

        .thermo-state-none { border-color: rgba(100,116,139,0.3); }
        .thermo-state-none .thermo-label { color: #64748b; }
        .thermo-state-cold { border-color: rgba(45,212,255,0.4); box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 20px rgba(45,212,255,0.2); }
        .thermo-state-cold .thermo-label { color: var(--cold); text-shadow: 0 0 12px rgba(45,212,255,0.7); }
        .thermo-state-warm { border-color: rgba(251,191,36,0.4); box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 20px rgba(251,191,36,0.2); }
        .thermo-state-warm .thermo-label { color: var(--warm); text-shadow: 0 0 12px rgba(251,191,36,0.7); }
        .thermo-state-hot { border-color: rgba(255,59,30,0.4); box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 20px rgba(255,59,30,0.2); }
        .thermo-state-hot .thermo-label { color: var(--hot); text-shadow: 0 0 12px rgba(255,59,30,0.7); }

        @keyframes thermoBounce { 0%,100% { transform: translateX(-50%) scale(1); } 40% { transform: translateX(-50%) scale(1.15); } }
        .thermo-bounce { animation: thermoBounce 0.4s cubic-bezier(0.34,1.56,0.64,1); }

        /* ====== لوحة التحكم السفلية ====== */
        .bottom-panel {
            background: rgba(10,15,28,0.97); border-top: 1px solid var(--border);
            padding: 15px; flex-shrink: 0; z-index: 30;
        }
        .instruction-bar { text-align: center; font-size: 1.1rem; font-weight: 700; color: #cbd5e1; margin-bottom: 12px; }

        .eval-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-eval {
            padding: 12px 5px; border: none; border-radius: 12px; font-size: 1.05rem; font-weight: 900;
            font-family: 'Cairo', sans-serif; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-eval:active { transform: scale(0.95); }
        .btn-cold-eval { background: linear-gradient(145deg, #1d4ed8, #1e3a8a); border-bottom: 4px solid #172554;}
        .btn-warm-eval { background: linear-gradient(145deg, #d97706, #92400e); border-bottom: 4px solid #713f12;}
        .btn-hot-eval { background: linear-gradient(145deg, #dc2626, #7f1d1d); border-bottom: 4px solid #450a0a;}
        .btn-correct-eval { grid-column: span 2; background: linear-gradient(145deg, #10b981, #047857); border-bottom: 4px solid #022c22; font-size: 1.2rem;}

        .wait-box { background: rgba(255,255,255,0.03); border: 2px dashed rgba(251,191,36,0.3); border-radius: 14px; padding: 15px; text-align: center; display: none; }
        .wait-box p { color: var(--warm); font-size: 1.1rem; font-weight: bold; animation: waitPulse 1.5s infinite; margin:0;}
        @keyframes waitPulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }

    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyB5CobIKfYdAz8jaabJpMQrGoqS9Ton28Y", authDomain: "buttons-f3501.firebaseapp.com", databaseURL: "https://buttons-f3501-default-rtdb.firebaseio.com", projectId: "buttons-f3501" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const urlParams = new URLSearchParams(window.location.search);
        const pin = urlParams.get('pin');
        let myName = urlParams.get('name');
        const isHost = urlParams.get('role') === 'host';

        const myId = "p_" + Date.now();
        const roomRef = ref(db, `hotcold/${pin}`);
        const stateRef = ref(db, `hotcold/${pin}/state`);
        const playersRef = ref(db, `hotcold/${pin}/players`);

        const WORDS = ["سيارة كامري","أريكة (كنب)","مكيف هواء","برج إيفل","بيتزا","شاحن جوال","نظارة شمسية","فرشاة أسنان","ثلاجة","طائرة هليكوبتر","أسد","فنجان قهوة","ساعة حائط","جواز سفر","سجادة صلاة","تلفزيون","ميكروويف","دراجة نارية","قلم رصاص","شجرة نخل","مفتاح سيارة","حذاء رياضي","مظلة (شمسية)","حقيبة ظهر","دفتر ملاحظات","ميزان","إبريق شاي","عصير برتقال","حمام سباحة","لوحة مفاتيح","طماطم","عنكبوت","كوكب المريخ","غواصة","قرد","بطيخ","برميل ماء","مقص"];

        let gameState = { status: 'lobby' };
        let players = {};
        let myPlayer = { name: myName, turnCount: 0 };

        get(ref(db, `hotcold/${pin}/players/${myId}`)).then((snap) => {
            if (!snap.exists()) set(ref(db, `hotcold/${pin}/players/${myId}`), myPlayer);
            else myName = snap.val().name;
        });

        onValue(playersRef, snap => {
            players = snap.val() || {};
            myPlayer = players[myId] || myPlayer;
            renderUI();
        });

        onValue(stateRef, snap => {
            const newState = snap.val() || { status: 'lobby' };
            const prevEval = gameState.lastEval;
            gameState = newState;
            
            // تفعيل نبضة الترمومتر للتقييم الكلي
            if (gameState.lastEval && gameState.lastEval !== prevEval && gameState.lastEval !== 'none') {
                triggerEvalEffect(gameState.lastEval);
            }
            renderUI();
        });

        function getNextGuesser(currentId) {
            const pIds = Object.keys(players).sort();
            const idx = pIds.indexOf(currentId);
            return pIds[(idx + 1) % pIds.length];
        }

        window.startGame = async () => {
            const pIds = Object.keys(players).sort();
            if (pIds.length < 2) return alert("نحتاج لاعبين اثنين على الأقل لبدء اللعبة!");

            let shuffled = [...WORDS].sort(() => 0.5 - Math.random());
            let updates = {};
            
            pIds.forEach((id, index) => {
                updates[`hotcold/${pin}/players/${id}/secret`] = shuffled[index];
                updates[`hotcold/${pin}/players/${id}/turnCount`] = 0;
            });

            updates[`hotcold/${pin}/state`] = {
                status: 'playing',
                currentGuesser: pIds[0],
                lastEval: 'none',
                currentVotes: null // تصفير التصويتات
            };
            
            await update(ref(db), updates);
        };

        // --- نظام التقييم بالإجماع ---
        window.sendEval = async (evalType) => {
            // لا يمكنك تقييم نفسك، ولا يمكنك التقييم مرتين
            if (gameState.currentGuesser === myId) return; 
            if (gameState.currentVotes && gameState.currentVotes[myId]) return; 

            const currentGId = gameState.currentGuesser;
            const pCount = Object.keys(players).length;
            const requiredVotes = pCount - 1; // الجميع عدا السائل

            // إذا ضغط أحد (صح)، يفوز فوراً ولا ننتظر البقية
            if (evalType === 'correct') {
                await update(stateRef, {
                    status: 'game_over',
                    winnerId: currentGId,
                    winnerName: players[currentGId].name,
                    winnerWord: players[currentGId].secret
                });
                return;
            }

            // إضافة صوتي الحالي
            let newVotes = gameState.currentVotes || {};
            newVotes[myId] = evalType;

            // هل اكتمل التصويت؟
            if (Object.keys(newVotes).length >= requiredVotes) {
                // اكتمل! استخراج أعلى تقييم لتلوين الترمومتر به
                let allVals = Object.values(newVotes);
                let overallEval = 'cold';
                if (allVals.includes('hot')) overallEval = 'hot';
                else if (allVals.includes('warm')) overallEval = 'warm';

                // زيادة عدد المحاولات للسائل
                await update(ref(db, `hotcold/${pin}/players/${currentGId}`), {
                    turnCount: (players[currentGId].turnCount || 0) + 1
                });

                // تحديث الحالة لتظهر جميع الأصوات وتوهج الترمومتر
                await update(stateRef, {
                    currentVotes: newVotes,
                    lastEval: overallEval 
                });

                // انتظار 3 ثواني ليقرأ الجميع النتائج، ثم ننتقل للسائل التالي
                setTimeout(async () => {
                    await update(stateRef, {
                        currentGuesser: getNextGuesser(currentGId),
                        currentVotes: null, // تصفير التصويتات للround القادم
                        lastEval: 'none'
                    });
                }, 3000);

            } else {
                // لم يكتمل التصويت بعد، فقط نحدث قائمة الأصوات
                await update(stateRef, { currentVotes: newVotes });
            }
        };

        function triggerEvalEffect(evalType) {
            const ambientBg = document.getElementById('ambientBg');
            const hub = document.getElementById('thermoHub');
            ambientBg.className = 'ambient-bg';
            hub.classList.remove('thermo-bounce');
            void hub.offsetWidth;
            
            if (evalType === 'cold') ambientBg.classList.add('state-cold');
            else if (evalType === 'warm') ambientBg.classList.add('state-warm');
            else if (evalType === 'hot') ambientBg.classList.add('state-hot');
            
            hub.classList.add('thermo-bounce');
            setTimeout(() => hub.classList.remove('thermo-bounce'), 400);
        }

        function renderUI() {
            const overlay = document.getElementById('overlay');
            const pIds = Object.keys(players).sort();

            // ---- اللوبي ----
            if (gameState.status === 'lobby') {
                overlay.style.display = 'flex';
                const badges = pIds.map(id => `<div class="player-badge">${players[id].name} ${id===myId?'(أنت)':''}</div>`).join('');
                
                overlay.innerHTML = `
                    <div class="overlay-card">
                        <div style="font-size: 0.9rem; color: #94a3b8;">كود الغرفة</div>
                        <div class="pin-display">${pin}</div>
                        <div style="margin: 15px 0;">${badges}</div>
                        <p style="color: #cbd5e1; font-weight:bold;">${pIds.length} لاعبين متصلين</p>
                        ${isHost
                            ? `<button class="btn-start" onclick="startGame()" ${pIds.length < 2 ? 'disabled' : ''}>🚀 بدء اللعب الجماعي!</button>`
                            : `<p style="color:var(--warm); margin-top:20px; font-weight:bold;">⏳ في انتظار الهوست للبدء...</p>`
                        }
                    </div>
                `;
                return;
            }

            // ---- نهاية اللعبة ----
            if (gameState.status === 'game_over') {
                overlay.style.display = 'flex';
                const winnerTurns = players[gameState.winnerId]?.turnCount ?? 0;
                overlay.innerHTML = `
                    <div class="overlay-card" style="border-color:rgba(16,185,129,0.4);">
                        <span style="font-size: 5rem; display:block; margin-bottom:10px;">🏆</span>
                        <div style="font-size:2rem; font-weight:900; color:var(--green);">البطل ${gameState.winnerName}!</div>
                        <div style="font-size:1.2rem; color:#cbd5e1; margin:10px 0;">الكلمة: <strong style="color:var(--warm); font-size:1.5rem;">${gameState.winnerWord}</strong></div>
                        <div style="color:#64748b;">استغرق ${winnerTurns + 1} أسئلة ليعرفها!</div>
                        ${isHost ? `<button class="btn-start" onclick="startGame()">🔄 جولة انتقام جديدة!</button>` : `<p style="color:var(--warm); margin-top:20px;">⏳ الهوست يجهز الجولة...</p>`}
                    </div>
                `;
                return;
            }

            overlay.style.display = 'none';

            // ---- رسم منطقة الخصوم (وإظهار تصويت كل شخص) ----
            const oppContainer = document.getElementById('opponentsContainer');
            oppContainer.innerHTML = '';
            
            pIds.forEach(id => {
                if (id === myId) return; 
                const opp = players[id];
                const isActive = gameState.currentGuesser === id ? 'is-active-turn' : '';
                
                // استخراج تصويت هذا اللاعب إن وجد
                let voteHtml = '';
                if (gameState.currentVotes && gameState.currentVotes[id]) {
                    let v = gameState.currentVotes[id];
                    let vEmoji = v === 'hot' ? '🔥' : (v === 'warm' ? '🌤️' : '🧊');
                    let vColor = v === 'hot' ? 'var(--hot)' : (v === 'warm' ? 'var(--warm)' : 'var(--cold)');
                    voteHtml = `<div class="vote-badge" style="background:${vColor}">${vEmoji}</div>`;
                }
                
                oppContainer.innerHTML += `
                    <div class="player-zone ${isActive}">
                        <div class="turn-badge">🎤 يسأل</div>
                        <div class="player-info">
                            <div class="avatar">👤</div>
                            <span class="p-name">${opp.name}</span>
                            <span class="score-tag">${opp.turnCount || 0} سؤال</span>
                        </div>
                        <div class="word-card word-card-opp">
                            ${voteHtml}
                            ${opp.secret || '؟؟؟'}
                        </div>
                    </div>
                `;
            });

            // ---- رسم منطقتي الخاصة (الأسفل) ----
            document.getElementById('myName').textContent = myName;
            document.getElementById('myScore').textContent = `${myPlayer.turnCount || 0} سؤال`;
            const myZone = document.getElementById('myZone');
            myZone.classList.toggle('is-active-turn', gameState.currentGuesser === myId);

            // ---- تحديث الترمومتر الرئيسي ----
            const hub = document.getElementById('thermoHub');
            const thermoEmoji = document.getElementById('thermoEmoji');
            const thermoLabel = document.getElementById('thermoLabel');
            hub.className = 'thermometer-hub';

            const evalMap = {
                cold:  { cls:'thermo-state-cold', emoji:'🧊', label:'بارد' },
                warm:  { cls:'thermo-state-warm', emoji:'🌤️', label:'دافئ' },
                hot:   { cls:'thermo-state-hot',  emoji:'🔥', label:'حار!' },
                none:  { cls:'thermo-state-none', emoji:'🌡️', label:'ننتظر' }
            };
            const evalInfo = evalMap[gameState.lastEval] || evalMap.none;
            hub.classList.add(evalInfo.cls);
            thermoEmoji.textContent = evalInfo.emoji;
            thermoLabel.textContent = evalInfo.label;

            // ---- لوحة التحكم السفلية ----
            const evalGrid = document.getElementById('evalGrid');
            const waitBox = document.getElementById('waitBox');
            const instruction = document.getElementById('instruction');

            const totalVotesNeeded = pIds.length - 1;
            const currentVotesCount = gameState.currentVotes ? Object.keys(gameState.currentVotes).length : 0;

            if (gameState.currentGuesser === myId) {
                // أنا السائل، أنتظر إجماع البقية
                evalGrid.style.display = 'none';
                waitBox.style.display = 'block';
                waitBox.innerHTML = `<p>⏳ ننتظر تقييم أصدقائك... (${currentVotesCount}/${totalVotesNeeded})</p>`;
                instruction.textContent = '🎤 دورك! اسأل أصدقاءك بصوتك عن لوحتك';
            } else {
                // دور زميل آخر للسؤال
                const activeName = players[gameState.currentGuesser]?.name || 'زميلك';
                let myVote = gameState.currentVotes ? gameState.currentVotes[myId] : null;

                if (myVote) {
                    // لقد قمت بالتصويت، أنتظر البقية
                    evalGrid.style.display = 'none';
                    waitBox.style.display = 'block';
                    waitBox.innerHTML = `<p>✅ تم تسجيل تقييمك! ننتظر البقية... (${currentVotesCount}/${totalVotesNeeded})</p>`;
                    instruction.innerHTML = `ننتظر إجماع البقية على سؤال <span style="color:var(--warm)">${activeName}</span>`;
                } else {
                    // لم أصوت بعد، يجب أن أقيم
                    evalGrid.style.display = 'grid';
                    waitBox.style.display = 'none';
                    instruction.innerHTML = `👂 استمع لسؤال <span style="color:var(--warm)">${activeName}</span> وقيمه!`;
                }
            }
        }
    </script>
</head>
<body>

    <div class="ambient-bg state-neutral" id="ambientBg"></div>
    <div class="overlay" id="overlay"></div>

    <div class="game-arena">

        <div class="opponents-container" id="opponentsContainer"></div>

        <div class="center-divider">
            <div class="divider-line"></div>
            <div class="thermometer-hub thermo-state-none" id="thermoHub">
                <span class="thermo-emoji" id="thermoEmoji">🌡️</span>
                <span class="thermo-label" id="thermoLabel">البداية</span>
            </div>
        </div>

        <div class="my-zone" id="myZone">
            <div class="turn-badge" style="top:10px; right:10px;">🎤 دورك لتسأل</div>
            <div class="word-card word-card-mine">؟ ؟ ؟</div>
            <div class="player-info" style="margin-top: 15px; margin-bottom: 0;">
                <div class="avatar" style="border-color:var(--warm);">🙋</div>
                <span class="p-name" id="myName" style="color:var(--warm);">أنت</span>
                <span class="score-tag" id="myScore" style="margin-right:auto;">0 سؤال</span>
            </div>
        </div>

    </div>

    <div class="bottom-panel">
        <div class="instruction-bar" id="instruction">جاري التحميل...</div>

        <div class="eval-grid" id="evalGrid">
            <button class="btn-eval btn-cold-eval" onclick="sendEval('cold')">🧊 بارد</button>
            <button class="btn-eval btn-warm-eval" onclick="sendEval('warm')">🌤️ دافئ</button>
            <button class="btn-eval btn-hot-eval" onclick="sendEval('hot')">🔥 حار</button>
            <button class="btn-eval btn-correct-eval" onclick="sendEval('correct')">🏆 إجابة صحيحة!</button>
        </div>

        <div class="wait-box" id="waitBox"></div>
    </div>

</body>
</html>
