<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>حار بارد - الطاولة</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; user-select: none; }
        body { background-color: #0f172a; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; background-image: radial-gradient(circle at center, #1e293b 0%, #020617 100%);}

        /* --- اللوبي --- */
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(2, 6, 23, 0.95); z-index: 100; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; backdrop-filter: blur(10px);}
        .box { background: #1e293b; padding: 40px; border-radius: 20px; border: 2px solid #475569; box-shadow: 0 20px 50px rgba(0,0,0,0.8); width: 90%; max-width: 400px;}
        .pin-text { font-size: 4.5rem; color: #facc15; font-family: monospace; font-weight: 900; letter-spacing: 8px; margin: 10px 0; text-shadow: 0 0 20px rgba(250, 204, 21, 0.4);}
        .btn-start { width: 100%; padding: 15px; font-size: 1.5rem; font-weight: bold; background: linear-gradient(135deg, #10b981, #047857); color: white; border: none; border-radius: 12px; cursor: pointer; margin-top: 20px; box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4); transition: 0.2s;}
        .btn-start:active { transform: scale(0.95); }

        /* --- ساحة اللعب (طاولة متقابلة) --- */
        .game-arena { flex: 1; display: flex; flex-direction: column; position: relative;}
        
        /* تصميم اللاعب واللوحة */
        .player-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding: 20px; transition: 0.3s;}
        .active-turn { background: radial-gradient(circle, rgba(250, 204, 21, 0.1) 0%, transparent 70%); }
        
        .avatar-wrap { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; background: rgba(0,0,0,0.4); padding: 5px 20px 5px 5px; border-radius: 50px; border: 1px solid #334155;}
        .avatar { width: 50px; height: 50px; background: #334155; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; border: 2px solid #64748b;}
        .p-name { font-size: 1.2rem; font-weight: bold; color: #cbd5e1;}
        
        /* مؤشر الدور (المايكروفون) */
        .turn-badge { position: absolute; right: 20px; top: 20px; background: #facc15; color: black; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 1rem; box-shadow: 0 0 15px rgba(250, 204, 21, 0.5); animation: pulseBadge 1.5s infinite alternate; display: none;}
        @keyframes pulseBadge { from { transform: scale(1); } to { transform: scale(1.1); } }
        .active-turn .turn-badge { display: block; }

        /* اللوحات الخشبية (البطاقات) */
        .board-container { perspective: 1000px; width: 80%; max-width: 350px; height: 120px;}
        .board { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; font-size: 2.2rem; font-weight: 900; border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); position: relative;}
        
        /* لوحة الخصم (موجهة لك، تراها واضحة) */
        .board-front { background: linear-gradient(135deg, #fdfbf7, #e2e8f0); color: #0f172a; border: 5px solid #cbd5e1; transform: rotateX(-5deg); text-shadow: 1px 1px 2px rgba(0,0,0,0.2);}
        
        /* لوحتك أنت (ظهرها موجه لك) */
        .board-back { background: repeating-linear-gradient(45deg, #1e293b, #1e293b 10px, #0f172a 10px, #0f172a 20px); color: #facc15; border: 5px solid #334155; transform: rotateX(5deg); font-size: 4rem; letter-spacing: 5px;}

        /* --- خط المنتصف والترمومتر --- */
        .table-divider { height: 4px; background: #334155; width: 100%; position: absolute; top: 50%; transform: translateY(-50%); z-index: 1;}
        .thermometer-wrapper { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5; background: #0f172a; padding: 10px 20px; border-radius: 30px; border: 3px solid #475569; display: flex; gap: 15px; align-items: center; box-shadow: 0 0 20px rgba(0,0,0,0.8);}
        .thermo-icon { font-size: 2.5rem; transition: 0.3s;}
        .thermo-text { font-size: 1.5rem; font-weight: bold; width: 100px; text-align: center; transition: 0.3s;}

        .temp-cold { color: #3b82f6; text-shadow: 0 0 15px #3b82f6; }
        .temp-warm { color: #facc15; text-shadow: 0 0 15px #facc15; }
        .temp-hot { color: #ef4444; text-shadow: 0 0 15px #ef4444; }
        .temp-none { color: #64748b; }

        /* --- لوحة التحكم السفلية --- */
        .bottom-panel { background: #1e293b; padding: 20px; border-top: 3px solid #334155; display: flex; flex-direction: column; gap: 15px; flex-shrink: 0; z-index: 10;}
        
        .instruction-text { text-align: center; font-size: 1.2rem; font-weight: bold; color: #cbd5e1; margin-bottom: 5px;}

        /* وضع التقييم (يظهر عندما يسأل الخصم) */
        .eval-mode { display: flex; gap: 10px; width: 100%;}
        .btn-eval { flex: 1; padding: 15px 0; border: none; border-radius: 12px; font-size: 1.3rem; font-weight: bold; cursor: pointer; transition: 0.2s; color: white;}
        .btn-eval:active { transform: scale(0.95); }
        .btn-cold { background: linear-gradient(to bottom, #3b82f6, #1d4ed8); border-bottom: 4px solid #1e3a8a;}
        .btn-warm { background: linear-gradient(to bottom, #facc15, #ca8a04); color: black; border-bottom: 4px solid #a16207;}
        .btn-hot { background: linear-gradient(to bottom, #ef4444, #b91c1c); border-bottom: 4px solid #7f1d1d;}
        .btn-correct { background: linear-gradient(to bottom, #10b981, #047857); border-bottom: 4px solid #064e3b;}
        
        /* وضع الانتظار (يظهر عندما يكون دورك للسؤال) */
        .wait-mode { background: #0f172a; padding: 15px; border-radius: 12px; text-align: center; border: 2px dashed #475569; display: none;}
        .wait-mode p { margin: 0; font-size: 1.3rem; color: #facc15; font-weight: bold; animation: pulseWait 1.5s infinite alternate;}
        @keyframes pulseWait { from { opacity: 0.6; } to { opacity: 1; } }

    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyB5CobIKfYdAz8jaabJpMQrGoqS9Ton28Y", authDomain: "buttons-f3501.firebaseapp.com", databaseURL: "https://buttons-f3501-default-rtdb.firebaseio.com", projectId: "buttons-f3501" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const urlParams = new URLSearchParams(window.location.search);
        const pin = urlParams.get('pin');
        let myName = urlParams.get('name');
        const isHost = urlParams.get('role') === 'host';

        const myId = "p_" + Date.now();
        const roomRef = ref(db, `hotcold/${pin}`);
        const stateRef = ref(db, `hotcold/${pin}/state`);
        const playersRef = ref(db, `hotcold/${pin}/players`);

        // قاعدة بيانات الكلمات
        const WORDS = ["سيارة كامري", "أريكة (كنب)", "مكيف هواء", "برج إيفل", "بيتزا", "شاحن جوال", "نظارة شمسية", "فرشاة أسنان", "ثلاجة", "طائرة هليكوبتر", "أسد", "فنجان قهوة", "ساعة حائط", "جواز سفر", "سجادة صلاة", "تلفزيون", "ميكروويف", "دراجة نارية", "قلم رصاص", "شجرة نخل", "مفتاح سيارة", "حذاء رياضي", "مظلة (شمسية)"];

        let gameState = { status: 'lobby' };
        let players = {};
        let myPlayer = { name: myName, turnCount: 0 };
        let opponentId = null;

        get(ref(db, `hotcold/${pin}/players/${myId}`)).then((snap) => {
            if (!snap.exists()) set(ref(db, `hotcold/${pin}/players/${myId}`), myPlayer);
            else myName = snap.val().name;
        });

        onValue(playersRef, snap => { 
            players = snap.val() || {}; 
            myPlayer = players[myId] || myPlayer;
            opponentId = Object.keys(players).find(id => id !== myId);
            renderUI(); 
        });

        onValue(stateRef, snap => { 
            gameState = snap.val() || { status: 'lobby' }; 
            renderUI(); 
        });

        // بدء اللعبة
        window.startGame = async () => {
            const pIds = Object.keys(players);
            if (pIds.length !== 2) return alert("الرجاء انتظار اللاعب الثاني!");

            let shuffled = [...WORDS].sort(() => 0.5 - Math.random());
            let updates = {};
            updates[`hotcold/${pin}/players/${pIds[0]}/secret`] = shuffled[0];
            updates[`hotcold/${pin}/players/${pIds[0]}/turnCount`] = 0;
            updates[`hotcold/${pin}/players/${pIds[1]}/secret`] = shuffled[1];
            updates[`hotcold/${pin}/players/${pIds[1]}/turnCount`] = 0;

            updates[`hotcold/${pin}/state`] = { 
                status: 'playing', 
                currentGuesser: pIds[0], // اللاعب الذي يجب أن يسأل بصوته
                lastEval: 'none'
            };

            await update(ref(db), updates);
        };

        // إرسال التقييم
        window.sendEval = async (evalType) => {
            // لا أستطيع التقييم إلا إذا كان الخصم هو المُخمن
            if (gameState.currentGuesser !== opponentId) return;

            if (evalType === 'correct') {
                await update(stateRef, {
                    status: 'game_over',
                    winnerId: opponentId,
                    winnerName: players[opponentId].name,
                    winnerWord: players[opponentId].secret
                });
                return;
            }

            // تحديث عدد أسئلة الخصم
            await update(ref(db, `hotcold/${pin}/players/${opponentId}`), {
                turnCount: (players[opponentId].turnCount || 0) + 1
            });

            // انتقال الدور: المُقيّم يصبح مُخمِناً
            await update(stateRef, {
                currentGuesser: myId,
                lastEval: evalType
            });
        };

        function renderUI() {
            const overlay = document.getElementById('overlay');
            
            // --- اللوبي ---
            if (gameState.status === 'lobby') {
                overlay.style.display = 'flex';
                let pCount = Object.keys(players).length;
                overlay.innerHTML = `
                    <div class="box">
                        <h2 style="color:#94a3b8; margin:0;">كود الغرفة:</h2>
                        <div class="pin-text">${pin}</div>
                        <p style="font-size:1.2rem;">اللاعبون: ${pCount} / 2</p>
                        ${isHost ? `<button class="btn-start" onclick="startGame()" ${pCount !== 2 ? 'disabled style="opacity:0.5"' : ''}>🚀 بدء التحدي</button>` : '<p style="color:#facc15; font-size:1.2rem; font-weight:bold;">في انتظار الهوست...</p>'}
                    </div>
                `;
                return;
            }

            // --- نهاية اللعبة ---
            if (gameState.status === 'game_over') {
                overlay.style.display = 'flex';
                overlay.innerHTML = `
                    <div class="box" style="border-color:#10b981;">
                        <h1 style="font-size:4rem; margin:0;">🏆</h1>
                        <h2 style="color:#10b981; font-size:2rem;">فاز ${gameState.winnerName}!</h2>
                        <p style="font-size:1.2rem; color:#cbd5e1;">الكلمة كانت: <b style="color:#facc15">${gameState.winnerWord}</b></p>
                        <p>احتاج إلى ${players[gameState.winnerId].turnCount + 1} محاولات لمعرفتها.</p>
                        ${isHost ? `<button class="btn-start" onclick="startGame()">🔄 تحدي جديد</button>` : '<p style="color:#facc15; margin-top:10px;">في انتظار الهوست لجولة جديدة...</p>'}
                    </div>
                `;
                return;
            }

            overlay.style.display = 'none';

            // --- رسم الطاولة ---
            if (opponentId && players[opponentId]) {
                const opp = players[opponentId];
                document.getElementById('oppName').innerText = opp.name;
                document.getElementById('oppWord').innerText = opp.secret || '؟؟؟';
                
                const oppArea = document.getElementById('oppArea');
                if (gameState.currentGuesser === opponentId) {
                    oppArea.classList.add('active-turn');
                } else {
                    oppArea.classList.remove('active-turn');
                }
            }

            document.getElementById('myName').innerText = myName;
            const myArea = document.getElementById('myArea');
            if (gameState.currentGuesser === myId) {
                myArea.classList.add('active-turn');
            } else {
                myArea.classList.remove('active-turn');
            }

            // --- تحديث الترمومتر ---
            const thermoIcon = document.getElementById('thermoIcon');
            const thermoText = document.getElementById('thermoText');
            thermoIcon.className = 'thermo-icon';
            thermoText.className = 'thermo-text';

            if (gameState.lastEval === 'cold') {
                thermoIcon.innerText = '🧊'; thermoText.innerText = 'بارد';
                thermoIcon.classList.add('temp-cold'); thermoText.classList.add('temp-cold');
            } else if (gameState.lastEval === 'warm') {
                thermoIcon.innerText = '☀️'; thermoText.innerText = 'دافئ';
                thermoIcon.classList.add('temp-warm'); thermoText.classList.add('temp-warm');
            } else if (gameState.lastEval === 'hot') {
                thermoIcon.innerText = '🔥'; thermoText.innerText = 'حار';
                thermoIcon.classList.add('temp-hot'); thermoText.classList.add('temp-hot');
            } else {
                thermoIcon.innerText = '🌡️'; thermoText.innerText = 'البداية';
                thermoIcon.classList.add('temp-none'); thermoText.classList.add('temp-none');
            }

            // --- لوحة التحكم السفلية ---
            const evalMode = document.getElementById('evalMode');
            const waitMode = document.getElementById('waitMode');
            const instruction = document.getElementById('instruction');

            if (gameState.currentGuesser === myId) {
                // دوري للحديث
                evalMode.style.display = 'none';
                waitMode.style.display = 'block';
                instruction.innerText = "🎤 تحدث واسأل خصمك عن لوحتك المخفية!";
            } else {
                // دوري للتقييم (الخصم يتحدث)
                evalMode.style.display = 'flex';
                waitMode.style.display = 'none';
                instruction.innerText = `🤔 استمع لسؤال ${players[opponentId]?.name} ثم قيّمه!`;
            }
        }
    </script>
</head>
<body>

    <div class="overlay" id="overlay"></div>

    <div class="game-arena">
        
        <div class="player-area" id="oppArea">
            <div class="turn-badge">🎤 يتحدث الآن</div>
            <div class="avatar-wrap">
                <div class="avatar">👤</div>
                <div class="p-name" id="oppName">الخصم</div>
            </div>
            <div class="board-container">
                <div class="board board-front" id="oppWord">؟؟؟</div>
            </div>
        </div>

        <div class="table-divider"></div>
        <div class="thermometer-wrapper">
            <div class="thermo-icon temp-none" id="thermoIcon">🌡️</div>
            <div class="thermo-text temp-none" id="thermoText">البداية</div>
        </div>

        <div class="player-area" id="myArea">
            <div class="turn-badge">🎤 تتحدث الآن</div>
            <div class="board-container">
                <div class="board board-back">؟ ؟ ؟</div>
            </div>
            <div class="avatar-wrap" style="margin-top: 15px; margin-bottom: 0;">
                <div class="avatar" style="border-color: #facc15;">👤</div>
                <div class="p-name" id="myName" style="color: #facc15;">أنت</div>
            </div>
        </div>

    </div>

    <div class="bottom-panel">
        <div class="instruction-text" id="instruction">جاري التحميل...</div>
        
        <div class="eval-mode" id="evalMode">
            <button class="btn-eval btn-cold" onclick="sendEval('cold')">🧊 بارد</button>
            <button class="btn-eval btn-warm" onclick="sendEval('warm')">☀️ دافئ</button>
            <button class="btn-eval btn-hot" onclick="sendEval('hot')">🔥 حار</button>
            <button class="btn-eval btn-correct" onclick="sendEval('correct')">🏆 الإجابة صحيحة!</button>
        </div>

        <div class="wait-mode" id="waitMode">
            <p>⏳ في انتظار تقييم الخصم لسؤالك...</p>
        </div>
    </div>

</body>
</html>
